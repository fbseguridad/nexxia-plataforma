<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexxia.shop | Bienvenido</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Arial', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo { font-size: 3.5rem; font-weight: bold; margin-bottom: 5px; }
        .logo span { color: #00ff9d; }
        .container { text-align: center; border: 1px solid #222; padding: 40px; border-radius: 30px; background: #0a0a0a; box-shadow: 0 0 30px rgba(0,255,157,0.1); }
        .btn { display: block; width: 280px; padding: 18px; margin: 20px auto; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; text-decoration: none; text-align: center; }
        .btn-world { background: #00ff9d; color: #000; }
        .btn-world:hover { transform: scale(1.05); box-shadow: 0 0 20px #00ff9d; }
        .btn-night { background: #ff2fd2; color: #fff; }
        .btn-night:hover { transform: scale(1.05); box-shadow: 0 0 20px #ff2fd2; }
    </style>
</head>
<body>
    <div class="logo">NEXXIA<span>.shop</span></div>
    <div class="container">
        <h2>Elige tu experiencia</h2>
        <p>Contenido libre o entretenimiento privado.</p>
        <a href="register.html?mode=world" class="btn btn-world">NEXXIA WORLD</a>
        <a href="register.html?mode=night" class="btn btn-night">NEXXIA NIGHT 🔞</a>
    </div>
</body>
</html>
