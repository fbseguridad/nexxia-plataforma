<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Nexxia.shop</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .reg-box { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; width: 350px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box;}
        .btn-reg { width: 100%; padding: 15px; background: #00ff9d; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .age-check { font-size: 13px; color: #bbb; margin: 15px 0; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="reg-box">
        <h2 style="text-align:center;">Crear Perfil</h2>
        <input type="text" id="username" placeholder="Nombre de usuario">
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        
        <label>Interés principal:</label>
        <select id="interest">
            <option value="arte">🎨 Arte & Diseño</option>
            <option value="gym">💪 Gym & Fitness</option>
            <option value="cocina">🍳 Cocina & Gourmet</option>
            <option value="night">🔞 Night Club (+18)</option>
        </select>

        <div class="age-check">
            <input type="checkbox" id="adultCheck"> 
            Confirmo que soy mayor de 18 años.
        </div>
        <button class="btn-reg">EMPEZAR AHORA</button>
    </div>
</body>
</html>
