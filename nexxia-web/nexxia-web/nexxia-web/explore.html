</head>

        <div class="post-content">
            <span style="color:#00ff9d;">@usuario_demo</span>
            <p>Bienvenidos a mi nueva sección en Nexxia!</p>
            <button class="btn-tip">💎 ENVIAR PROPINA</button>
        </div>
    </div>
</body>
</html>
