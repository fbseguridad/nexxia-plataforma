<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexxia.shop | Bienvenidos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --purpura: #6a00ff; --rosa: #ff2fd2; --cian: #00d4ff; 
            --negro: #050507; --gris: #111115; 
            --glow: 0 0 20px rgba(255, 47, 210, 0.5);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--negro); font-family: 'Inter', sans-serif; color: white; overflow: hidden; }
        
        /* --- SPLASH SCREEN ANIMADO --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--negro); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20000;
            transition: opacity 0.6s ease-out;
        }

        .logo-splash { 
            font-family: 'Cinzel', serif; font-size: 3rem; letter-spacing: 8px; 
            margin: 0; animation: pulse 2s infinite; 
        }
        .logo-splash span { color: var(--rosa); text-shadow: var(--glow); }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 10px var(--purpura)); }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        /* --- LANDING CONTENT --- */
        .landing-bg { 
            background: radial-gradient(circle at center, #1a0033 0%, #050507 100%); 
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 1s ease-in;
        }
        .main-card { 
            background: rgba(17, 17, 21, 0.8); backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; 
            padding: 45px; max-width: 420px; width: 85%; text-align: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
        }

        .welcome-img { width: 100%; max-width: 280px; border-radius: 25px; margin-bottom: 25px; border: 1px solid var(--gris); }
        .logo-landing { font-family: 'Cinzel', serif; font-size: 2.2rem; letter-spacing: 4px; margin-bottom: 5px; }
        .logo-landing span { color: var(--rosa); font-size: 0.6em; }
        
        h2 { font-size: 0.9rem; color: var(--cian); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-login { 
            display: block; width: 100%; padding: 18px; 
            background: linear-gradient(45deg, var(--purpura), var(--rosa)); 
            border: none; border-radius: 20px; color: white; font-size: 1.1rem; 
            font-weight: 800; cursor: pointer; text-decoration: none; 
            box-sizing: border-box; margin-bottom: 20px; transition: 0.3s;
        }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(138, 43, 226, 0.4); }

        .footer-text { color: #888; font-size: 0.85rem; line-height: 1.5; }
        .footer-text a { color: var(--cian); text-decoration: none; font-weight: 700; }
        .motto { font-size: 0.75rem; color: #555; font-style: italic; margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; }

    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 class="logo-splash">NEXXIA<span>...</span></h1>
        <div style="margin-top: 20px; width: 40px; height: 2px; background: var(--rosa); border-radius: 2px; opacity: 0.5;"></div>
    </div>

    <div class="landing-bg" id="landingContent">
        <div class="main-card">
            <img src="login-bg.png.jpg" alt="Bienvenidos" class="welcome-img">
            <h1 class="logo-landing">NEXXIA<span>.shop</span></h1>
            <h2>Libertad • Conexión • Ganancias</h2>
            
            <a href="login.html" class="btn-login">ENTRAR AL UNIVERSO</a>
            
            <p class="footer-text">¿Eres nuevo por aquí?<br> 
                <a href="register.html">Crea tu cuenta gratis</a>
            </p>
            
            <p class="motto">El espacio donde ser tú mismo tiene recompensa.</p>
        </div>
    </div>

    <script type="module">
        import { auth } from "./js/firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const splash = document.getElementById('splash-screen');
        const landing = document.getElementById('landingContent');

        // Monitor de sesión
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Usuario detectado: Salto directo al Dashboard
                window.location.href = "dashboard.html"; 
            } else {
                // Sin sesión: Mostrar Landing con suavidad
                splash.style.opacity = "0";
                setTimeout(() => {
                    splash.style.display = "none";
                    landing.style.opacity = "1";
                    document.body.style.overflow = "auto"; // Habilitar scroll
                }, 600);
            }
        });
    </script>
</body>
</html>
